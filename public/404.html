<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bedfellow</title>
    <!--
      GitHub Pages SPA fallback. Pages serves this file for any unknown path
      (e.g. /plant/asclepias-tuberosa on a hard refresh or external link). We
      encode the path into a query string and bounce to the site root, where a
      matching script in index.html restores the real URL and lets Vue Router
      take over. Apex/custom domain -> keep 0 path segments.
      (Technique: rafgraph/spa-github-pages.)
    -->
    <script>
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
