<!doctype html>
<html lang="en">

    <title>Page not found — Bedfellow</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#1f3320" />
    <style>
      :root {
        --bg: #f7f5f0;
        --ink: #1f3320;
        --ink-soft: #4a5a4b;
        --accent: #356b35;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }
      header {
        background: var(--ink);
        color: #f1ebd9;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
        font-size: 18px;
      }
      header svg { height: 1.5em; width: 1.5em; }
      header sup { font-size: 9px; vertical-align: super; opacity: 0.8; }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 48px 24px;
      }
      .code {
        font-size: 64px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--accent);
        margin: 0;
      }
      h1 { font-size: 22px; margin: 8px 0 4px; }
      p { color: var(--ink-soft); max-width: 32rem; line-height: 1.5; }
      .home {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: var(--accent);
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
      }
      .home:hover { background: #2c5a2c; }
    </style>
  </head>
