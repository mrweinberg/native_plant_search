<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Restore the real URL after the 404.html SPA fallback redirect. Must run
         before the app boots. (Technique: rafgraph/spa-github-pages.) -->
    <script>
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>

    <title>Bedfellow — Plan a native garden</title>
    <meta
      name="description"
      content="Search North American native plants by region, light, soil, and bloom time. Plan a garden with continuous bloom and find companion plants that thrive together."
    />
    <link rel="canonical" href="https://bedfellow.org/" />
    <meta name="theme-color" content="#1f3320" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bedfellow" />
    <meta property="og:title" content="Bedfellow — Plan a native garden" />
    <meta
      property="og:description"
      content="Search North American native plants by region, light, soil, and bloom time, and find companion plants that thrive together."
    />
    <meta property="og:url" content="https://bedfellow.org/" />
    <meta property="og:image" content="https://bedfellow.org/plants/echinacea-purpurea.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bedfellow — Plan a native garden that blooms all season" />
    <meta
      name="twitter:description"
      content="Search North American native plants by region, light, soil, and bloom time."
    />
    <meta name="twitter:image" content="https://bedfellow.org/plants/echinacea-purpurea.jpg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Bedfellow",
        "url": "https://bedfellow.org",
        "description": "Search North American native plants by region, light, soil, and bloom time, and plan a garden that blooms all season.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://bedfellow.org/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
